<form>
  <input type="text" [formField]="form.q" />
  <button type="button">X</button>
</form>
@if (resource.hasValue()) {
  <ul>
    @for (item of resource.value().items; track item) {
      <li>
        {{ item.summary }}
      </li>
    }
  </ul>
} @else if (resource.error(); as error) {
  <p>{{ error.message }}</p>
} @else if (resource.isLoading()) {
  <p>Loading</p>
}
