<ul>
  @for (item of items(); track item.resourceName) {
    <li>
      <div class="person-info">
        <strong>{{ item.names?.[0]?.displayName || 'No Name' }}</strong>
        @if (item.emailAddresses?.[0]) {
          <div class="email">{{ item.emailAddresses[0].value }}</div>
        }
        @if (item.phoneNumbers?.[0]) {
          <div class="phone">{{ item.phoneNumbers[0].value }}</div>
        }
      </div>
    </li>
  }
</ul>
